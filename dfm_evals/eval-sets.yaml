sets:
  agentic:
    description: Agentic suite
    tasks:
      - name: inspect_evals/agentharm
        args:
          - -T
          - refusal_judge={{judge_model}}
          - -T
          - semantic_judge={{judge_model}}
      - name: inspect_evals/agentharm_benign
        args:
          - -T
          - refusal_judge={{judge_model}}
          - -T
          - semantic_judge={{judge_model}}
      - name: inspect_evals/agentdojo
        args:
          - -T
          - with_sandbox_tasks=no
          - -T
          - workspace=banking
    args:
      - --model
      - "{{target_model}}"
      - --limit
      - "5"
      - --temperature
      - "0"
  fundamentals:
    description: Broad inspect_evals fundamentals set
    tasks:
      - inspect_evals/gsm8k
      - name: inspect_evals/mask
        args:
          - -T
          - binary_judge_model={{judge_model}}
          - -T
          - numeric_judge_model={{judge_model}}
      - inspect_evals/musr
      - inspect_evals/ifeval
      - dfm_evals/ifeval-da
      - inspect_evals/truthfulqa
      - name: inspect_evals/agentharm_benign
        args:
          - -T
          - refusal_judge={{judge_model}}
          - -T
          - semantic_judge={{judge_model}}
          - --limit
          - "20"
      - name: inspect_evals/simpleqa_verified
        args:
          - -T
          - grader_model={{judge_model}}
      - dfm_evals/multi_wiki_qa
      - dfm_evals/bfcl-v1
    args:
      - --model
      - "{{target_model}}"
      - --limit
      - "100"
      - --temperature
      - "0"
  openthoughts_tblite:
    description: inspect_harbor OpenThoughts-TBLite suite (requires inspect-harbor; sample failures are logged without aborting the full eval)
    tasks:
      - inspect_harbor/openthoughts_tblite
    args:
      - --model
      - "{{target_model}}"
      - --no-fail-on-error
      - --continue-on-fail
      - --limit
      - "100"
      - --temperature
      - "0"
